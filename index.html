    init() {
      let mode = 'raw';
      let raw = new Array(10).fill(NaN);
      let discPairs  = Array.from({length: 5}, () => ({ x: NaN, n: NaN }));
      let intTriples = Array.from({length: 5}, () => ({ a: NaN, b: NaN, n: NaN }));
      let curDist = 'normal';
      let manualParams = {};
      let estimate = true;
      let method = 'density';

      function initManualParams(distId) {
        const d = DISTRIBUTIONS[distId];
        const obj = {};
        for (const p of d.params) obj[p.name] = p.def;
        return obj;
      }
      manualParams = initManualParams('normal');

      // === Сетки ввода (повторяют разделы stats, но с префиксом f19) ===
      function renderRawCells() {
        const c = $('f19r-cells'); c.innerHTML = '';
        for (let i = 0; i < raw.length; i++) {
          const div = document.createElement('div'); div.className = 'tv-cell';
          const inp = document.createElement('input'); inp.type = 'text';
          inp.placeholder = String(i + 1);
          inp.value = isFinite(raw[i]) ? String(raw[i]).replace('.', ',') : '';
          inp.addEventListener('input', () => {
            const v = parseFloat(inp.value.replace(',', '.'));
            raw[i] = isFinite(v) ? v : NaN; recompute();
          });
          const x = document.createElement('button');
          x.className = 'tv-cell-x'; x.textContent = '×';
          x.addEventListener('click', () => { raw.splice(i, 1); renderRawCells(); recompute(); });
          div.appendChild(inp); div.appendChild(x);
          c.appendChild(div);
        }
        const add = document.createElement('button');
        add.className = 'tv-cell-add'; add.textContent = '+';
        add.addEventListener('click', () => { raw.push(NaN); renderRawCells(); });
        c.appendChild(add);
      }
      function renderDiscRows() {
        const c = $('f19d-rows'); c.innerHTML = '';
        for (let i = 0; i < discPairs.length; i++) {
          const row = document.createElement('div'); row.className = 'tv-data-row';
          const num = document.createElement('div'); num.className = 'tv-row-num'; num.textContent = (i + 1);
          const ix = document.createElement('input'); ix.type = 'text';
          ix.value = isFinite(discPairs[i].x) ? String(discPairs[i].x).replace('.', ',') : '';
          ix.addEventListener('input', () => {
            const v = parseFloat(ix.value.replace(',', '.'));
            discPairs[i].x = isFinite(v) ? v : NaN; recompute();
          });
          const inn = document.createElement('input'); inn.type = 'text';
          inn.value = isFinite(discPairs[i].n) ? String(discPairs[i].n).replace('.', ',') : '';
          inn.addEventListener('input', () => {
            const v = parseFloat(inn.value.replace(',', '.'));
            discPairs[i].n = isFinite(v) ? v : NaN; recompute();
          });
          const x = document.createElement('button');
          x.className = 'tv-cell-x'; x.textContent = '×';
          x.addEventListener('click', () => { discPairs.splice(i, 1); renderDiscRows(); recompute(); });
          row.appendChild(num); row.appendChild(ix); row.appendChild(inn); row.appendChild(x);
          c.appendChild(row);
        }
      }
      function renderIntRows() {
        const c = $('f19i-rows'); c.innerHTML = '';
        for (let i = 0; i < intTriples.length; i++) {
          const row = document.createElement('div'); row.className = 'tv-data-row tv-tri';
          const num = document.createElement('div'); num.className = 'tv-row-num'; num.textContent = (i + 1);
          const ia = document.createElement('input'); ia.type = 'text';
          ia.value = isFinite(intTriples[i].a) ? String(intTriples[i].a).replace('.', ',') : '';
          ia.addEventListener('input', () => {
            const v = parseFloat(ia.value.replace(',', '.'));
            intTriples[i].a = isFinite(v) ? v : NaN; recompute();
          });
          const ib = document.createElement('input'); ib.type = 'text';
          ib.value = isFinite(intTriples[i].b) ? String(intTriples[i].b).replace('.', ',') : '';
          ib.addEventListener('input', () => {
            const v = parseFloat(ib.value.replace(',', '.'));
            intTriples[i].b = isFinite(v) ? v : NaN; recompute();
          });
          const inn = document.createElement('input'); inn.type = 'text';
          inn.value = isFinite(intTriples[i].n) ? String(intTriples[i].n).replace('.', ',') : '';
          inn.addEventListener('input', () => {
            const v = parseFloat(inn.value.replace(',', '.'));
            intTriples[i].n = isFinite(v) ? v : NaN; recompute();
          });
          const x = document.createElement('button');
          x.className = 'tv-cell-x'; x.textContent = '×';
          x.addEventListener('click', () => { intTriples.splice(i, 1); renderIntRows(); recompute(); });
          row.appendChild(num); row.appendChild(ia); row.appendChild(ib); row.appendChild(inn); row.appendChild(x);
          c.appendChild(row);
        }
      }

      function getActiveData() {
        if (mode === 'raw') return { kind: 'raw', xs: raw.filter(v => isFinite(v)) };
        if (mode === 'discrete') {
          const pairs = discPairs.filter(p => isFinite(p.x) && isFinite(p.n) && p.n > 0)
            .map(p => ({ x: p.x, n: p.n })).sort((a, b) => a.x - b.x);
          const merged = [];
          for (const p of pairs) {
            if (merged.length && merged[merged.length-1].x === p.x) merged[merged.length-1].n += p.n;
            else merged.push({ x: p.x, n: p.n });
          }
          return { kind: 'discrete', pairs: merged };
        }
        const tris = intTriples.filter(t => isFinite(t.a) && isFinite(t.b) && isFinite(t.n) && t.n > 0 && t.b > t.a)
          .map(t => ({ a: t.a, b: t.b, n: t.n })).sort((x, y) => x.a - y.a);
        return { kind: 'interval', tris };
      }
      function dataSummary(data) {
        if (data.kind === 'raw') {
          const xs = data.xs;
          if (!xs.length) return null;
          return { N: xs.length, mean: M.mean(xs), varB: M.variance(xs, true), varS: M.variance(xs, false), min: Math.min(...xs), max: Math.max(...xs) };
        }
        if (data.kind === 'discrete') {
          const xs = data.pairs.map(p => p.x), ns = data.pairs.map(p => p.n);
          const N = M.wSum(ns);
          if (N === 0) return null;
          return { N, mean: M.wMean(xs, ns), varB: M.wVariance(xs, ns, true), varS: M.wVariance(xs, ns, false), min: xs[0], max: xs[xs.length-1] };
        }
        const tris = data.tris;
        if (!tris.length) return null;
        return { N: tris.reduce((a,t)=>a+t.n,0), mean: M.intervalMean(tris), varB: M.intervalVariance(tris, true), varS: M.intervalVariance(tris, false), min: tris[0].a, max: tris[tris.length-1].b };
      }

      function renderParams() {
        const dist = DISTRIBUTIONS[curDist];
        $('f19-dist-desc').textContent = dist.desc;
        const wrap = $('f19-params');
        wrap.innerHTML = '';
        for (const p of dist.params) {
          const div = document.createElement('div'); div.className = 'tv-input';
          const lbl = document.createElement('label'); lbl.textContent = p.label;
          const inp = document.createElement('input'); inp.type = 'number';
          inp.dataset.name = p.name;
          if (p.step !== undefined) inp.step = p.step;
          if (p.min !== undefined)  inp.min  = p.min;
          if (p.max !== undefined)  inp.max  = p.max;
          inp.value = manualParams[p.name];
          inp.disabled = estimate && p.estimable;
          inp.addEventListener('input', () => {
            const v = parseFloat(inp.value.replace(',', '.'));
            manualParams[p.name] = isFinite(v) ? v : p.def;
            recompute();
          });
          div.appendChild(lbl); div.appendChild(inp);
          wrap.appendChild(div);
        }
      }

      function getEffectiveParams(summary) {
        const dist = DISTRIBUTIONS[curDist];
        const p = Object.assign({}, manualParams);
        if (estimate && summary && dist.estimate) {
          const est = dist.estimate(summary, p);
          for (const def of dist.params) {
            if (def.estimable && est[def.name] !== undefined && isFinite(est[def.name])) {
              p[def.name] = est[def.name];
              const inp = $('f19-params').querySelector('input[data-name="' + def.name + '"]');
              if (inp) inp.value = Number(est[def.name].toPrecision(6));
            }
          }
        }
        return p;
      }

      function setMode(m) {
        mode = m;
        $('f19-mode-raw').style.display      = mode === 'raw'      ? '' : 'none';
        $('f19-mode-discrete').style.display = mode === 'discrete' ? '' : 'none';
        $('f19-mode-interval').style.display = mode === 'interval' ? '' : 'none';
        $('f19-mode-tabs').querySelectorAll('button').forEach(b =>
          b.classList.toggle('active', b.dataset.mode === mode));
        recompute();
      }
      function setDist(d) {
        curDist = d;
        manualParams = initManualParams(d);
        $('f19-dist-tabs').querySelectorAll('button').forEach(b =>
          b.classList.toggle('active', b.dataset.dist === d));
        renderParams();
        recompute();
      }

      function recompute() {
        const data = getActiveData();
        if (mode === 'raw')           $('f19r-n').textContent = data.xs.length;
        else if (mode === 'discrete') $('f19d-N').textContent = data.pairs.reduce((a,p)=>a+p.n, 0);
        else                          $('f19i-N').textContent = data.tris.reduce((a,t)=>a+t.n, 0);

        const summary = dataSummary(data);
        const w = $('f19-warn');
        if (!summary || summary.N === 0) {
          ['chi','df','p','crit'].forEach(k => setVal('f19-' + k, '—'));
          $('f19-conclusion').textContent = 'Введите данные.';
          $('f19-conclusion').className = 'tv-conclusion';
          $('f19-table').innerHTML = '';
          w.style.display = 'none';
          return;
        }
        const params = getEffectiveParams(summary);
        const dist = DISTRIBUTIONS[curDist];
        const nBinsManual = parseInt($('f19-bins').value);
        // переключатель метода имеет смысл только для непрерывных распределений
        $('f19-method-block').style.display = dist.isDiscrete ? 'none' : '';
        const built = buildBins(mode, data, dist, params, nBinsManual, dist.isDiscrete ? 'pmf' : method);
        if (built.error) {
          ['chi','df','p','crit'].forEach(k => setVal('f19-' + k, '—'));
          $('f19-conclusion').textContent = 'Расчёт невозможен — режим ввода и распределение несовместимы.';
          $('f19-conclusion').className = 'tv-conclusion reject';
          $('f19-table').innerHTML = '';
          w.textContent = built.error; w.style.display = '';
          return;
        }

        const merged = mergeBins(built.rows, 5);
        const m_count = merged.length;
        const r = estimate ? dist.params.filter(p => p.estimable).length : 0;
        const k = m_count - r - 1;

        let chi = 0;
        for (const row of merged) if (row.np > 0) chi += (row.n - row.np)*(row.n - row.np) / row.np;

        const alpha = parseFloat(($('f19-alpha').value || '0.05').replace(',', '.'));
        setVal('f19-chi', fmt(chi, 4));
        setVal('f19-df', String(k));
        if (k <= 0) {
          setVal('f19-p', '—'); setVal('f19-crit', '—');
          $('f19-conclusion').innerHTML = 'Слишком мало интервалов после объединения малых ожидаемых частот (k ≤ 0). Попробуйте увеличить число интервалов или объём выборки.';
          $('f19-conclusion').className = 'tv-conclusion reject';
        } else {
          const pVal = M.chiSqUpper(chi, k);
          const crit = M.chiSqInv(alpha, k);
          setVal('f19-p', fmt(pVal, 6));
          setVal('f19-crit', fmt(crit, 4));
          const accept = chi < crit;
          $('f19-conclusion').innerHTML = accept
            ? 'Гипотеза согласуется с данными на уровне α = ' + fmt(alpha, 4) + ': χ²<sub>набл</sub> = ' + fmt(chi, 4) + ' &lt; χ²<sub>крит</sub> = ' + fmt(crit, 4) + '. p-value = ' + fmt(pVal, 4) + '.'
            : 'Гипотеза отклоняется на уровне α = ' + fmt(alpha, 4) + ': χ²<sub>набл</sub> = ' + fmt(chi, 4) + ' ≥ χ²<sub>крит</sub> = ' + fmt(crit, 4) + '. p-value = ' + fmt(pVal, 4) + '.';
          $('f19-conclusion').className = 'tv-conclusion ' + (accept ? 'accept' : 'reject');
        }

        // таблица
        let head = '<tr><th>интервал / xᵢ</th><th>nᵢ</th><th>pᵢ</th><th>Npᵢ</th><th>(nᵢ − Npᵢ)²⁄Npᵢ</th></tr>';
        let body = '';
        for (const row of merged) {
          const term = row.np > 0 ? (row.n - row.np)*(row.n - row.np) / row.np : 0;
          body += '<tr><td>' + row.label + '</td><td>' + row.n + '</td><td>' + fmt(row.pi || 0, 4) + '</td><td>' + fmt(row.np, 4) + '</td><td>' + fmt(term, 4) + '</td></tr>';
        }
        body += '<tr><th colspan="4" style="text-align:right">Σ</th><th>' + fmt(chi, 4) + '</th></tr>';
        $('f19-table').innerHTML = head + body;

        if (merged.length < built.rows.length) {
          w.textContent = 'Объединено ' + (built.rows.length - merged.length) + ' малых интервалов (Npᵢ < 5). Учтено в k.';
          w.style.display = '';
        } else {
          w.style.display = 'none';
        }

        // График: рисуем по ИСХОДНЫМ интервалам (built.rows), а не по объединённым.
        // Объединение влияет только на расчёт χ², гистограмма должна показывать все исходные столбики.
        if (dist.isDiscrete) {
          const src = built.rows;
          const xs = src.map((r, i) => isFinite(r.x) ? r.x : (i + 0.5));
          drawCompareBars($('f19-canvas'), xs, src.map(r => r.n), src.map(r => r.np));
          $('f19-canvas-title').textContent = 'Бары — наблюдаемые nᵢ; точки + линия — теоретические Npᵢ';
        } else {
          const src = built.rows;
          const haveAB = src.every(r => isFinite(r.a) && isFinite(r.b));
          if (haveAB) {
            const edges = [src[0].a];
            for (const r of src) edges.push(r.b);
            const freqs = src.map(r => r.n);
            drawHistWithCurve($('f19-canvas'), edges, freqs, x => dist.pdf(x, params), summary.N);
            $('f19-canvas-title').textContent = 'Гистограмма по всем ' + src.length + ' исходным интервалам; красная линия — теоретическая плотность. Объединение малых интервалов учтено только в χ², но не на графике.';
          } else {
            drawCompareBars($('f19-canvas'), src.map((r, i) => i), src.map(r => r.n), src.map(r => r.np));
            $('f19-canvas-title').textContent = 'Наблюдаемые vs теоретические частоты';
          }
        }
      }

      // === слушатели ===
      $('f19-mode-tabs').querySelectorAll('button').forEach(b =>
        b.addEventListener('click', () => setMode(b.dataset.mode)));
      $('f19-dist-tabs').querySelectorAll('button').forEach(b =>
        b.addEventListener('click', () => setDist(b.dataset.dist)));
      $('f19-method-tabs').querySelectorAll('button').forEach(b =>
        b.addEventListener('click', () => {
          method = b.dataset.method;
          $('f19-method-tabs').querySelectorAll('button').forEach(x =>
            x.classList.toggle('active', x.dataset.method === method));
          recompute();
        }));
      $('f19-estimate').addEventListener('change', () => {
        estimate = $('f19-estimate').checked;
        renderParams(); recompute();
      });
      $('f19-alpha').addEventListener('input', recompute);
      $('f19-bins').addEventListener('input', recompute);

      // Raw
      $('f19r-apply').addEventListener('click', () => {
        const parsed = parseData($('f19r-text').value);
        raw = parsed.length ? parsed.slice() : new Array(10).fill(NaN);
        renderRawCells(); recompute();
      });
      $('f19r-example').addEventListener('click', () => {
        raw = [165,170,175,168,172,178,174,169,171,173,177,175,168,170,172,174,176,173,169,171,170,172,174,168,176];
        $('f19r-text').value = raw.join(', '); renderRawCells(); recompute();
      });
      $('f19r-clear').addEventListener('click', () => { raw = new Array(10).fill(NaN); $('f19r-text').value=''; renderRawCells(); recompute(); });
      $('f19r-add10').addEventListener('click', () => { for (let i = 0; i < 10; i++) raw.push(NaN); renderRawCells(); });
      $('f19r-text').addEventListener('blur', () => { if ($('f19r-text').value.trim()) $('f19r-apply').click(); });

      // Discrete
      $('f19d-apply').addEventListener('click', () => {
        const arr = parseData($('f19d-text').value);
        const pairs = []; for (let i = 0; i + 1 < arr.length; i += 2) pairs.push({ x: arr[i], n: arr[i + 1] });
        discPairs = pairs.length ? pairs : Array.from({length: 5}, () => ({ x: NaN, n: NaN }));
        renderDiscRows(); recompute();
      });
      $('f19d-example').addEventListener('click', () => {
        discPairs = [{x:0,n:18},{x:1,n:26},{x:2,n:18},{x:3,n:7},{x:4,n:1}];
        $('f19d-text').value = discPairs.map(p => p.x + ' ' + p.n).join(', ');
        // авто-выбираем Пуассон
        setDist('poisson');
        renderDiscRows(); recompute();
      });
      $('f19d-clear').addEventListener('click', () => { discPairs = Array.from({length:5}, () => ({x:NaN,n:NaN})); $('f19d-text').value=''; renderDiscRows(); recompute(); });
      $('f19d-add').addEventListener('click', () => { discPairs.push({x:NaN,n:NaN}); renderDiscRows(); });
      $('f19d-text').addEventListener('blur', () => { if ($('f19d-text').value.trim()) $('f19d-apply').click(); });

      // Interval
      $('f19i-apply').addEventListener('click', () => {
        const arr = parseData($('f19i-text').value);
        const tris = []; for (let i = 0; i + 2 < arr.length; i += 3) tris.push({ a: arr[i], b: arr[i + 1], n: arr[i + 2] });
        intTriples = tris.length ? tris : Array.from({length: 5}, () => ({ a: NaN, b: NaN, n: NaN }));
        renderIntRows(); recompute();
      });
      $('f19i-example').addEventListener('click', () => {
        intTriples = [{a:0,b:10,n:5},{a:10,b:20,n:12},{a:20,b:30,n:18},{a:30,b:40,n:10},{a:40,b:50,n:5}];
        $('f19i-text').value = intTriples.map(t => t.a + ' ' + t.b + ' ' + t.n).join(', ');
        renderIntRows(); recompute();
      });
      $('f19i-clear').addEventListener('click', () => { intTriples = Array.from({length:5}, () => ({a:NaN,b:NaN,n:NaN})); $('f19i-text').value=''; renderIntRows(); recompute(); });
      $('f19i-add').addEventListener('click', () => { intTriples.push({a:NaN,b:NaN,n:NaN}); renderIntRows(); });
      $('f19i-text').addEventListener('blur', () => { if ($('f19i-text').value.trim()) $('f19i-apply').click(); });

      renderRawCells(); renderDiscRows(); renderIntRows();
      setDist('normal');
      setMode('raw');
    }
  }
];

/* ============================================================
   5. ИНИЦИАЛИЗАЦИЯ
   ============================================================ */
function showPage(id) {
  PAGES.forEach(p => {
    const el = $('page-' + p.id);
    if (el) el.classList.toggle('active', p.id === id);
  });
  document.querySelectorAll('.tv-nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
  // перерисовать графики на активной странице
  const page = PAGES.find(p => p.id === id);
  if (page && typeof page._refresh === 'function') page._refresh();
}

// Логические группы для навигации (общий порядок и сквозная нумерация)
const NAV_ORDER = [
  { group: 'Комбинаторика',               ids: ['fact', 'comb', 'bern'] },
  { group: 'Функции нормального',         ids: ['phi', 'laplace', 'invlap'] },
  { group: 'Дискретные распределения',    ids: ['binom', 'poisson', 'hyper', 'geom'] },
  { group: 'Непрерывные распределения',   ids: ['norm', 'expdist', 'unif', 'gamma', 'beta'] },
  { group: 'Проверка гипотез',            ids: ['student', 'chi', 'fisher'] },
  { group: 'Выборочная статистика',       ids: ['stats', 'pearson'] }
];
const orderedIds = NAV_ORDER.flatMap(g => g.ids);
const stripPrefix = (s) => (s || '').replace(/^\d+\*?\.\s*/, '');

function init() {
  const nav = $('tvNav');
  const main = $('tvMain');

  // Навигация по группам, страницы в порядке NAV_ORDER
  let counter = 0;
  for (const grp of NAV_ORDER) {
    const h = document.createElement('div');
    h.className = 'tv-nav-group';
    h.textContent = grp.group;
    nav.appendChild(h);
    for (const id of grp.ids) {
      const p = PAGES.find(x => x.id === id);
      if (!p) continue;
      counter++;
      const btn = document.createElement('button');
      btn.textContent = counter + '. ' + stripPrefix(p.nav);
      btn.dataset.id = id;
      btn.addEventListener('click', () => showPage(id));
      nav.appendChild(btn);
    }
  }
  // Страницы — в том же порядке
  let pageNum = 0;
  for (const id of orderedIds) {
    const p = PAGES.find(x => x.id === id);
    if (!p) continue;
    pageNum++;
    const sec = document.createElement('section');
    sec.id = 'page-' + p.id;
    sec.className = 'tv-page';
    sec.innerHTML = `
      <h2><span class="tv-page-num">${pageNum}.</span>${stripPrefix(p.title)}</h2>
      <p class="tv-desc">${p.desc}</p>
      <div class="tv-formula">${p.formula}</div>
      ${p.html}
    `;
    main.appendChild(sec);
  }

  PAGES.forEach(p => p.init && p.init());

  // === ПОПОВЕР СПРАВКИ ===
  const popover = document.createElement('div');
  popover.className = 'tv-popover';
  $('terverApp').appendChild(popover);
  let popoverOpenedBy = null;
  function showPopover(icon) {
    const text = icon.dataset.help || '';
    const formula = icon.dataset.formula || '';
    popover.innerHTML = (text ? '<div>' + text + '</div>' : '') +
      (formula ? '<div class="tv-popover-formula">' + formula + '</div>' : '');
    popover.style.display = 'block';
    const r = icon.getBoundingClientRect();
    const pw = popover.offsetWidth;
    const ph = popover.offsetHeight;
    let left = r.left;
    if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
    if (left < 12) left = 12;
    let top = r.bottom + 8;
    if (top + ph > window.innerHeight - 12) top = r.top - ph - 8;
    popover.style.left = left + 'px';
    popover.style.top  = top + 'px';
    popoverOpenedBy = icon;
  }
  function hidePopover() {
    popover.style.display = 'none';
    popoverOpenedBy = null;
  }
  document.addEventListener('click', (e) => {
    const icon = e.target.closest('.tv-help-icon');
    if (icon) {
      e.stopPropagation();
      if (popoverOpenedBy === icon) hidePopover();
      else showPopover(icon);
    } else if (!e.target.closest('.tv-popover')) {
      hidePopover();
    }
  });
  window.addEventListener('scroll', hidePopover, true);
  window.addEventListener('resize', hidePopover);

  // theme toggle
  const themeBtn = $('tvTheme');
  const app = $('terverApp');
  function setTheme(t) {
    app.dataset.theme = t;
    themeBtn.textContent = t === 'dark' ? '☀ Светлая' : '☾ Тёмная';
    try { localStorage.setItem('terver-theme', t); } catch (e) {}
    // перерисовать активный график (цвета берутся из CSS-переменных)
    const active = document.querySelector('.tv-page.active');
    if (active) {
      const id = active.id.replace('page-', '');
      const page = PAGES.find(p => p.id === id);
      if (page && page.init) {
        // лёгкий способ перерендерить — диспатчим input на любом её инпуте
        const inp = active.querySelector('input');
        if (inp) inp.dispatchEvent(new Event('input'));
      }
    }
  }
  themeBtn.addEventListener('click', () => {
    setTheme(app.dataset.theme === 'dark' ? 'light' : 'dark');
  });
  let saved = 'light';
  try { saved = localStorage.getItem('terver-theme') || 'light'; } catch (e) {}
  setTheme(saved);

  showPage(PAGES[0].id);

  // перерисовка при ресайзе
  let rzTimer;
  window.addEventListener('resize', () => {
    clearTimeout(rzTimer);
    rzTimer = setTimeout(() => {
      const active = document.querySelector('.tv-page.active');
      if (!active) return;
      const inp = active.querySelector('input');
      if (inp) inp.dispatchEvent(new Event('input'));
    }, 120);
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
})();
</script>
