<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Калькулятор по теории вероятностей и математической статистике</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* === Wrapper isolation: все стили привязаны к .terver-app, чтобы не утекали в Tilda === */
.terver-app, .terver-app *, .terver-app *::before, .terver-app *::after { box-sizing: border-box; }
.terver-app {
  --bg:        #faf8f3;
  --card:      #ffffff;
  --text:      #1a1a1a;
  --muted:     #6b6b6b;
  --border:    #d8d4c8;
  --accent:    #2a4a7f;
  --accent-soft: #e8eef5;
  --result-bg: #f4f1e8;
  --result-text: #111;
  --chart-grid: #e6e2d6;
  --chart-axis: #888;
  --chart-bar:  #4a6da3;
  --chart-bar-hi: #b04545;
  --chart-line: #2a4a7f;
  --chart-fill: rgba(42,74,127,0.08);
  --chart-marker: #b04545;
  --error: #b04545;
  --shadow: 0 1px 2px rgba(0,0,0,0.04);

  font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  font-size: 15px;
  padding: 24px 16px 48px;
  min-height: 100vh;
  transition: background .2s, color .2s;
}
.terver-app[data-theme="dark"] {
  --bg:        #14171c;
  --card:      #1c2027;
  --text:      #e8e3d8;
  --muted:     #978f81;
  --border:    #2c323b;
  --accent:    #88aedd;
  --accent-soft: #232932;
  --result-bg: #232932;
  --result-text: #f4ecd8;
  --chart-grid: #262c34;
  --chart-axis: #6a7080;
  --chart-bar:  #6c98d4;
  --chart-bar-hi: #d57878;
  --chart-line: #88aedd;
  --chart-fill: rgba(136,174,221,0.12);
  --chart-marker: #d57878;
  --error: #d57878;
  --shadow: 0 1px 3px rgba(0,0,0,0.35);
}

.terver-app .tv-container { max-width: 1200px; margin: 0 auto; }

.terver-app .tv-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.terver-app h1 {
  font-family: inherit;
  font-size: 24px;
  font-weight: 500;
  margin: 0;
  letter-spacing: -0.01em;
}
.terver-app .tv-subtitle {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 14px;
  font-style: italic;
}
.terver-app .tv-theme {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13.5px;
  white-space: nowrap;
  transition: all .15s;
}
.terver-app .tv-theme:hover { border-color: var(--accent); color: var(--accent); }

.terver-app .tv-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 24px;
  align-items: start;
}
@media (max-width: 820px) {
  .terver-app .tv-layout { grid-template-columns: 1fr; }
}

.terver-app .tv-nav {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px;
  position: sticky;
  top: 12px;
  box-shadow: var(--shadow);
}
@media (max-width: 820px) { .terver-app .tv-nav { position: static; } }
.terver-app .tv-nav button {
  display: block;
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  color: var(--text);
  padding: 7px 10px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  transition: background .12s, color .12s;
}
.terver-app .tv-nav button:hover { background: var(--accent-soft); }
.terver-app .tv-nav button.active {
  background: var(--accent);
  color: #fff;
  font-weight: 600;
}

.terver-app .tv-page {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 24px 26px;
  box-shadow: var(--shadow);
}
.terver-app .tv-page.active { display: block; }

.terver-app .tv-page h2 {
  font-size: 20px;
  font-weight: 500;
  margin: 0 0 6px;
  letter-spacing: -0.005em;
}
.terver-app .tv-page .tv-desc {
  margin: 0 0 14px;
  color: var(--muted);
  font-size: 14px;
  font-style: italic;
}

.terver-app .tv-formula {
  font-family: "Cambria Math", Cambria, "STIX Two Math", "Times New Roman", serif;
  font-size: 17px;
  background: var(--result-bg);
  border-left: 3px solid var(--accent);
  padding: 10px 14px;
  margin: 0 0 18px;
  border-radius: 0 3px 3px 0;
  overflow-x: auto;
}
.terver-app .tv-formula i { font-style: italic; }
.terver-app .tv-formula sup, .terver-app .tv-formula sub { font-size: 0.75em; }

.terver-app .tv-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
}
.terver-app .tv-tabs button {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: inherit;
  font-size: 14px;
  padding: 8px 14px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all .12s;
}
.terver-app .tv-tabs button:hover { color: var(--text); }
.terver-app .tv-tabs button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}
.terver-app .tv-subpage { display: none; }
.terver-app .tv-subpage.active { display: block; }

.terver-app .tv-inputs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.terver-app .tv-input {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.terver-app .tv-input label {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}
.terver-app .tv-input input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 3px;
  font-family: inherit;
  font-size: 15px;
  transition: border-color .12s, box-shadow .12s;
}
.terver-app .tv-input input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.terver-app .tv-results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.terver-app .tv-result {
  background: var(--result-bg);
  border-radius: 3px;
  padding: 12px 16px;
  border-left: 3px solid var(--accent);
}
.terver-app .tv-result .tv-rlabel {
  font-size: 12.5px;
  color: var(--muted);
  font-style: italic;
  margin-bottom: 3px;
}
.terver-app .tv-result .tv-rval {
  font-family: "Cambria Math", Cambria, "Times New Roman", serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--result-text);
  word-break: break-all;
}
.terver-app .tv-result .tv-rval.error {
  color: var(--error);
  font-size: 14px;
  font-weight: 400;
  font-style: italic;
}

.terver-app .tv-table-wrap {
  overflow-x: auto;
  margin-bottom: 18px;
  border: 1px solid var(--border);
  border-radius: 3px;
}
.terver-app table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
  font-family: "Cambria Math", Cambria, serif;
}
.terver-app th, .terver-app td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.terver-app th {
  background: var(--result-bg);
  font-weight: 600;
  color: var(--accent);
  font-style: italic;
}

.terver-app .tv-chart {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px;
  margin-top: 6px;
}
.terver-app .tv-chart canvas {
  display: block;
  width: 100%;
  height: 320px;
}
.terver-app .tv-chart-title {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  font-style: italic;
  margin: 4px 0 0;
}

.terver-app .tv-help {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
  margin: 6px 0 14px;
}
.terver-app .tv-help b { color: var(--text); font-style: normal; }

.terver-app .tv-footer {
  text-align: center;
  color: var(--muted);
  font-size: 12.5px;
  font-style: italic;
  margin-top: 32px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}

.terver-app .tv-page-num {
  display: inline-block;
  font-family: "Cambria Math", serif;
  color: var(--accent);
  margin-right: 8px;
}

/* === ГРУППЫ В НАВИГАЦИИ === */
.terver-app .tv-nav-group {
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  padding: 10px 10px 4px;
  font-weight: 500;
}
.terver-app .tv-nav-group:first-child { padding-top: 4px; }

/* === ИКОНКА СПРАВКИ И ПОПОВЕР === */
.terver-app .tv-help-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  margin-left: 6px;
  cursor: pointer;
  user-select: none;
  vertical-align: middle;
  transition: all .12s;
  background: var(--card);
}
.terver-app .tv-help-icon:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.terver-app .tv-popover {
  position: fixed;
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 12px 14px;
  border-radius: 4px;
  font-size: 13.5px;
  max-width: 360px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  z-index: 99999;
  line-height: 1.5;
  display: none;
}
.terver-app .tv-popover .tv-popover-formula {
  font-family: "Cambria Math", Cambria, "Times New Roman", serif;
  background: var(--result-bg);
  padding: 6px 8px;
  border-radius: 3px;
  margin-top: 6px;
  font-size: 14px;
  border-left: 2px solid var(--accent);
}

/* === ВВОД ДАННЫХ ДЛЯ СТАТИСТИКИ === */
.terver-app textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 3px;
  font-family: "Cambria Math", Cambria, monospace;
  font-size: 14px;
  width: 100%;
  resize: vertical;
  transition: border-color .12s, box-shadow .12s;
}
.terver-app textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.terver-app .tv-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin: 8px 0 14px;
}
.terver-app .tv-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  transition: all .12s;
}
.terver-app .tv-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.terver-app .tv-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.terver-app .tv-btn.primary:hover {
  background: var(--accent);
  filter: brightness(1.08);
}
.terver-app .tv-actions-info {
  margin-left: auto;
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}

.terver-app .tv-cells {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
  gap: 6px;
  margin-bottom: 16px;
}
.terver-app .tv-cell {
  position: relative;
  display: flex;
  align-items: center;
}
.terver-app .tv-cell input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 22px 6px 8px;
  border-radius: 3px;
  font-family: "Cambria Math", Cambria, monospace;
  font-size: 14px;
  width: 100%;
  font-variant-numeric: tabular-nums;
  transition: border-color .12s;
}
.terver-app .tv-cell input:focus { outline: none; border-color: var(--accent); }
.terver-app .tv-cell .tv-cell-x {
  position: absolute;
  right: 4px;
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  padding: 2px 4px;
  line-height: 1;
}
.terver-app .tv-cell .tv-cell-x:hover { color: var(--error); }
.terver-app .tv-cell-add {
  background: var(--bg);
  border: 1px dashed var(--border);
  color: var(--muted);
  border-radius: 3px;
  cursor: pointer;
  font-size: 16px;
  font-family: inherit;
  padding: 6px 8px;
  transition: all .12s;
}
.terver-app .tv-cell-add:hover { border-color: var(--accent); color: var(--accent); }

.terver-app .tv-section-title {
  font-size: 16px;
  font-weight: 500;
  margin: 22px 0 10px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}

/* === Сетки строк для дискретного / интервального рядов === */
.terver-app .tv-row-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}
.terver-app .tv-data-row {
  display: grid;
  grid-template-columns: 28px 1fr 1fr 28px;
  gap: 6px;
  align-items: center;
}
.terver-app .tv-data-row.tv-tri {
  grid-template-columns: 28px 1fr 1fr 1fr 28px;
}
.terver-app .tv-data-row .tv-row-num {
  color: var(--muted);
  font-size: 13px;
  text-align: right;
  font-style: italic;
}
.terver-app .tv-data-row input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 8px;
  border-radius: 3px;
  font-family: "Cambria Math", Cambria, monospace;
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  width: 100%;
}
.terver-app .tv-data-row input:focus { outline: none; border-color: var(--accent); }
.terver-app .tv-data-row .tv-cell-x {
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
}
.terver-app .tv-data-row .tv-cell-x:hover { color: var(--error); }
.terver-app .tv-data-head {
  display: grid;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.terver-app .tv-data-head.tv-pair { grid-template-columns: 28px 1fr 1fr 28px; }
.terver-app .tv-data-head.tv-tri  { grid-template-columns: 28px 1fr 1fr 1fr 28px; }
.terver-app .tv-data-head > div { padding-left: 2px; }
.terver-app .tv-mode-input { margin-bottom: 4px; }
.terver-app .tv-warn {
  color: var(--error);
  font-size: 13px;
  font-style: italic;
  margin: 6px 0 12px;
}
.terver-app .tv-input input:disabled {
  background: var(--result-bg);
  color: var(--muted);
  cursor: not-allowed;
}
.terver-app .tv-conclusion {
  background: var(--result-bg);
  border-left: 3px solid var(--accent);
  padding: 10px 14px;
  border-radius: 0 3px 3px 0;
  margin: 12px 0 16px;
  font-size: 14px;
  line-height: 1.5;
}
.terver-app .tv-conclusion.reject  { border-left-color: var(--error); }
.terver-app .tv-conclusion.accept  { border-left-color: var(--accent); }
</style>
</head>
<body>

<div class="terver-app" id="terverApp" data-theme="light">
<div class="tv-container">

<header class="tv-header">
  <div>
    <h1>Теория вероятностей и математическая статистика</h1>
    <p class="tv-subtitle">Калькулятор и визуализация распределений</p>
  </div>
  <button class="tv-theme" id="tvTheme">☾ Тёмная</button>
</header>

<div class="tv-layout">
  <nav class="tv-nav" id="tvNav"></nav>
  <main id="tvMain"></main>
</div>

<footer class="tv-footer">
  Формулы и логика по материалам сайта mathprofi.ru (А. Емелин)
</footer>

</div>
</div>

<script>
(function(){
'use strict';

/* ============================================================
   1. МАТЕМАТИЧЕСКАЯ БИБЛИОТЕКА
   Все специальные функции, нужные для воспроизведения формул
   из исходной таблицы (без внешних зависимостей).
   ============================================================ */
const M = (function() {
  const SQRT2  = Math.SQRT2;
  const SQRT2PI = Math.sqrt(2*Math.PI);
  const LN_2PI = Math.log(2*Math.PI);

  /* erf(x) — функция ошибок, формула A&S 7.1.26 (≈ 1.5e-7) */
  function erf(x) {
    const a1 =  0.254829592, a2 = -0.284496736, a3 = 1.421413741;
    const a4 = -1.453152027, a5 =  1.061405429, p  = 0.3275911;
    const sgn = x < 0 ? -1 : 1;
    x = Math.abs(x);
    const t = 1 / (1 + p*x);
    const y = 1 - (((((a5*t + a4)*t) + a3)*t + a2)*t + a1)*t * Math.exp(-x*x);
    return sgn * y;
  }

  /* log Γ(x) — Lanczos, для x>0 */
  function logGamma(x) {
    const c = [76.18009172947146, -86.50532032941677, 24.01409824083091,
               -1.231739572450155, 1.208650973866179e-3, -5.395239384953e-6];
    let y = x, t = x + 5.5;
    t -= (x + 0.5) * Math.log(t);
    let s = 1.000000000190015;
    for (let j = 0; j < 6; j++) s += c[j] / ++y;
    return -t + Math.log(2.5066282746310005 * s / x);
  }
  function gammaFn(x) { return Math.exp(logGamma(x)); }

  /* Факториал (точный для малых n, через Γ для больших) */
  function fact(n) {
    if (n < 0 || !Number.isInteger(n)) return NaN;
    if (n <= 170) {
      let r = 1;
      for (let i = 2; i <= n; i++) r *= i;
      return r;
    }
    return Math.exp(logGamma(n + 1));
  }
  /* C(n,k) — через log-Γ для устойчивости */
  function combin(n, k) {
    if (k < 0 || k > n || !Number.isInteger(n) || !Number.isInteger(k)) return NaN;
    if (k === 0 || k === n) return 1;
    if (k > n - k) k = n - k;
    return Math.round(Math.exp(logGamma(n+1) - logGamma(k+1) - logGamma(n-k+1)));
  }
  /* P(n,k) = n!/(n-k)! */
  function perm(n, k) {
    if (k < 0 || k > n || !Number.isInteger(n) || !Number.isInteger(k)) return NaN;
    let r = 1;
    for (let i = n - k + 1; i <= n; i++) r *= i;
    return r;
  }

  /* Регуляризованная нижняя неполная гамма P(a,x) */
  function gammaP(a, x) {
    if (x < 0 || a <= 0) return NaN;
    if (x === 0) return 0;
    if (x < a + 1) {
      // ряд
      let ap = a, sum = 1/a, del = sum;
      for (let n = 1; n <= 300; n++) {
        ap++;
        del *= x/ap;
        sum += del;
        if (Math.abs(del) < Math.abs(sum)*1e-15) break;
      }
      return sum * Math.exp(-x + a*Math.log(x) - logGamma(a));
    }
    // непрерывная дробь для Q(a,x), затем 1 - Q
    return 1 - gammaQ(a, x);
  }
  function gammaQ(a, x) {
    if (x < 0 || a <= 0) return NaN;
    if (x === 0) return 1;
    if (x < a + 1) return 1 - gammaP(a, x);
    const FPMIN = 1e-300;
    let b = x + 1 - a, c = 1/FPMIN, d = 1/b, h = d;
    for (let i = 1; i <= 300; i++) {
      const an = -i*(i - a);
      b += 2;

/* ============================================================
   1b. ДОПОЛНИТЕЛЬНАЯ МАТЕМАТИКА: описательная статистика +

   ============================================================ */

/* === ОПИСАТЕЛЬНАЯ СТАТИСТИКА === */
M.mean = (xs) => xs.length ? xs.reduce((a,b)=>a+b, 0) / xs.length : NaN;
M.variance = (xs, biased) => {
  const n = xs.length;
  if ((biased && n < 1) || (!biased && n < 2)) return NaN;
  const m = M.mean(xs);
  let s = 0;
  for (const x of xs) s += (x - m)*(x - m);
  return biased ? s/n : s/(n - 1);
};
M.median = (xs) => {
  if (!xs.length) return NaN;
  const s = [...xs].sort((a,b)=>a-b);
  const n = s.length;
  return n % 2 ? s[(n-1)/2] : (s[n/2-1] + s[n/2]) / 2;
};
M.mode = (xs) => {
  if (!xs.length) return [];
  const map = new Map();
  for (const x of xs) map.set(x, (map.get(x) || 0) + 1);
  let max = 0;
  for (const v of map.values()) if (v > max) max = v;
  if (max === 1) return []; // все встречаются по одному разу — моды нет
  const res = [];
  for (const [k, v] of map) if (v === max) res.push(k);
  return res.sort((a,b) => a - b);

/* Линейная интерполяция между порядковыми статистиками (тип 7 в R) */
M.quantile = (xs, p) => {
  if (!xs.length || p < 0 || p > 1) return NaN;
  const s = [...xs].sort((a,b)=>a-b);
  const h = (s.length - 1) * p;
  const lo = Math.floor(h), hi = Math.ceil(h);
  if (lo === hi) return s[lo];
  return s[lo] + (h - lo) * (s[hi] - s[lo]);

M.centralMoment = (xs, k) => {
  if (xs.length < 1) return NaN;
  const m = M.mean(xs);
  let s = 0;
  for (const x of xs) s += Math.pow(x - m, k);
  return s / xs.length;
};
M.skewness = (xs) => {
  if (xs.length < 2) return NaN;
  const sd = Math.sqrt(M.variance(xs, true));
  if (sd === 0) return NaN;
  return M.centralMoment(xs, 3) / Math.pow(sd, 3);

/* Эксцесс по русской традиции: μ₄/σ⁴ − 3 */
M.kurtosis = (xs) => {
  if (xs.length < 2) return NaN;
  const sd = Math.sqrt(M.variance(xs, true));
  if (sd === 0) return NaN;
  return M.centralMoment(xs, 4) / Math.pow(sd, 4) - 3;

/* === ГАММА-РАСПРЕДЕЛЕНИЕ Γ(k, θ) (форма + масштаб) === */

  if (x < 0 || k <= 0 || theta <= 0) return 0;

  for (let i = 0; i < 60; i++) {
    const cdf = M.gammaCdf(x, k, theta);
    const pdf = M.gammaPdf(x, k, theta);
    if (pdf === 0 || !isFinite(pdf)) break;
    const dx = (cdf - p) / pdf;
    x -= dx;
    if (x <= 0) x = 1e-12;
    if (Math.abs(dx) < 1e-10) break;

/* === БЕТА-РАСПРЕДЕЛЕНИЕ B(α, β), x ∈ [0, 1] === */
M.betaPdf = (x, a, b) => {
  if (x <= 0 || x >= 1 || a <= 0 || b <= 0) return 0;
  const lpdf = (a - 1)*Math.log(x) + (b - 1)*Math.log(1 - x)

    const cdf = M.betaCdf(x, a, b);
    const pdf = M.betaPdf(x, a, b);

    let dx = (cdf - p) / pdf;

    if (x - dx >= 1) dx = -(1 - x) * 0.5;

    if (Math.abs(dx) < 1e-12) break;

/* === ЭКСПОНЕНЦИАЛЬНОЕ Exp(λ), x ≥ 0 === */
M.expPdf = (x, lam) => x < 0 ? 0 : lam * Math.exp(-lam * x);
M.expCdf = (x, lam) => x < 0 ? 0 : 1 - Math.exp(-lam * x);
M.expInv = (p, lam) => -Math.log(1 - p) / lam;

M.unifPdf = (x, a, b) => (x < a || x > b) ? 0 : 1 / (b - a);

/* === ГЕОМЕТРИЧЕСКОЕ Geom(p), число испытаний до 1-го успеха, k = 1, 2, … === */
M.geomPmf = (k, p) => {

M.geomCdf = (k, p) => k < 1 ? 0 : 1 - Math.pow(1 - p, Math.floor(k));

/* === ВЗВЕШЕННАЯ СТАТИСТИКА (для дискретного и интервального рядов) === */
M.wSum = (ns) => ns.reduce((a,b)=>a+b, 0);
M.wMean = (xs, ns) => {

M.wVariance = (xs, ns, biased) => {
  const N = M.wSum(ns);
  if ((biased && N < 1) || (!biased && N < 2)) return NaN;
  const m = M.wMean(xs, ns);
  let s = 0;
  for (let i = 0; i < xs.length; i++) s += (xs[i]-m)*(xs[i]-m)*ns[i];

  const sd = Math.sqrt(M.wVariance(xs, ns, true));

/* === ДИСКРЕТНЫЙ РЯД === */
/* Мода: значения с максимальной частотой */
M.discreteMode = (xs, ns) => {
  if (!xs.length) return [];
  let max = 0;
  for (const v of ns) if (v > max) max = v;
  if (max === 0) return [];
  const res = [];
  for (let i = 0; i < xs.length; i++) if (ns[i] === max) res.push(xs[i]);
  return res.sort((a,b)=>a-b);

/* Медиана / квантиль: среднее значение, на котором кумулята впервые

M.discreteQuantile = (sortedXs, sortedNs, p) => {
  const N = M.wSum(sortedNs);
  if (N === 0) return NaN;
  const target = p * N;
  let cum = 0;
  for (let i = 0; i < sortedXs.length; i++) {
    cum += sortedNs[i];
    if (cum > target) return sortedXs[i];
    if (cum === target && i + 1 < sortedXs.length) return (sortedXs[i] + sortedXs[i+1]) / 2;
  }
  return sortedXs[sortedXs.length - 1];

M.intervalSkewness = (triples) => {

  return M.intervalCentralMoment(triples, 3) / Math.pow(sd, 3);

M.intervalKurtosis = (triples) => {
  const sd = Math.sqrt(M.intervalVariance(triples, true));

/* Мода интервального ряда: формула с соседними частотами.

  const nn = mi < triples.length-1 ? triples[mi+1].n : 0;

  for (let i = 0; i < triples.length; i++) {

      const t = triples[i];
      const h = t.b - t.a;
      return t.a + h * (target - cum) / t.n;
    }
    cum += triples[i].n;
  }
  return triples[triples.length - 1].b;
};
M.intervalMedian = (triples) => M.intervalQuantile(triples, 0.5);

/* ============================================================
   2. ФОРМАТИРОВАНИЕ
   ============================================================ */
function fmt(x, dp) {
  if (x === null || x === undefined || !isFinite(x)) return '—';
  if (dp === undefined) dp = 4;
  if (Math.abs(x) >= 1e15 || (x !== 0 && Math.abs(x) < 1e-6)) {
    return x.toExponential(Math.max(2, dp - 2));
  }
  const r = Number(x.toFixed(dp));
  // если число большое и целое — без хвоста
  if (Number.isInteger(r) && Math.abs(r) >= 1) return r.toLocaleString('ru-RU');
  return r.toString().replace('.', ',');
}
function fmtPct(x) {
  if (!isFinite(x)) return '—';
  return (x*100).toFixed(2).replace('.', ',') + '%';
}
function $(id) { return document.getElementById(id); }
function setVal(id, v, isErr) {
  const el = $(id); if (!el) return;
  el.textContent = v;
  if (isErr) el.classList.add('error'); else el.classList.remove('error');
}
function num(id) { return parseFloat(($(id).value || '').replace(',', '.')); }

/* ============================================================
   3. ГРАФИКИ НА CANVAS
   Простой рисователь: оси, сетка, столбцы или линии, маркер.
   ============================================================ */
function getCss(name) {
  return getComputedStyle(document.getElementById('terverApp')).getPropertyValue(name).trim();
}

function setupCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width  = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  const ctx = canvas.getContext('2d');
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  return { ctx, w, h };
}

function niceTicks(min, max, count) {
  const range = max - min;
  if (range === 0) return [min];
  const rough = range / count;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / mag;
  let step;
  if (norm < 1.5) step = 1*mag;
  else if (norm < 3) step = 2*mag;
  else if (norm < 7) step = 5*mag;
  else step = 10*mag;
  const start = Math.ceil(min/step)*step;
  const ticks = [];
  for (let v = start; v <= max + step*0.0001; v += step) ticks.push(+v.toFixed(12));
  return ticks;
}

function tickLabel(v) {
  if (v === 0) return '0';
  if (Math.abs(v) >= 1e4 || Math.abs(v) < 1e-3) return v.toExponential(1);
  const s = (+v.toFixed(6)).toString();
  return s.replace('.', ',');
}

/* Базовый рисователь: рисует оси и сетку, возвращает функции преобразования */
function drawAxes(canvas, opts) {
  const { ctx, w, h } = setupCanvas(canvas);
  const padL = opts.padL || 52, padR = opts.padR || 14;
  const padT = opts.padT || 14, padB = opts.padB || 36;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;
  const { xMin, xMax, yMin, yMax, xLabel, yLabel } = opts;

  ctx.fillStyle = getCss('--card');
  ctx.fillRect(0, 0, w, h);

  // сетка
  const xTicks = opts.xTickValues || niceTicks(xMin, xMax, 8);
  const yTicks = niceTicks(yMin, yMax, 5);
  const xToPx = x => padL + (x - xMin) / (xMax - xMin) * plotW;
  const yToPx = y => padT + plotH - (y - yMin) / (yMax - yMin) * plotH;

  ctx.strokeStyle = getCss('--chart-grid');
  ctx.lineWidth = 1;
  for (const y of yTicks) {
    const py = yToPx(y);
    ctx.beginPath(); ctx.moveTo(padL, py); ctx.lineTo(padL + plotW, py); ctx.stroke();
  }
  for (const x of xTicks) {
    const px = xToPx(x);
    ctx.beginPath(); ctx.moveTo(px, padT); ctx.lineTo(px, padT + plotH); ctx.stroke();
  }

  // оси
  ctx.strokeStyle = getCss('--chart-axis');
  ctx.beginPath();
  ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + plotH); ctx.lineTo(padL + plotW, padT + plotH);
  ctx.stroke();

  // подписи
  ctx.fillStyle = getCss('--text');
  ctx.font = '12px Roboto, "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (const y of yTicks) {
    ctx.fillText(tickLabel(y), padL - 6, yToPx(y));
  }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (const x of xTicks) {
    ctx.fillText(tickLabel(x), xToPx(x), padT + plotH + 6);
  }
  if (xLabel) {
    ctx.font = 'italic 13px Roboto, "Helvetica Neue", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(xLabel, padL + plotW/2, h - 2);
  }
  if (yLabel) {
    ctx.save();
    ctx.translate(12, padT + plotH/2);
    ctx.rotate(-Math.PI/2);
    ctx.font = 'italic 13px Roboto, "Helvetica Neue", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(yLabel, 0, 0);
    ctx.restore();
  }

  return { ctx, padL, padR, padT, padB, plotW, plotH, xToPx, yToPx, xMin, xMax, yMin, yMax };
}

/* Столбчатая диаграмма для P(X=k), k = 0..N */
function drawBars(canvas, ks, ps, opts) {
  opts = opts || {};
  const validP = ps.filter(p => isFinite(p));
  const yMax = validP.length ? Math.max(...validP) * 1.15 : 1;
  const xMin = ks.length ? Math.min(...ks) - 0.6 : -0.6;
  const xMax = ks.length ? Math.max(...ks) + 0.6 : 0.6;
  // x-метки: только реальные k
  const xTickValues = ks.length <= 22 ? ks.slice() : niceTicks(Math.min(...ks), Math.max(...ks), 10);

  const A = drawAxes(canvas, {
    xMin, xMax, yMin: 0, yMax,
    xLabel: opts.xLabel || 'k',
    yLabel: opts.yLabel || 'P(X=k)',
    xTickValues
  });
  const { ctx, xToPx, yToPx } = A;
  const barColor = getCss('--chart-bar');
  const barHi = getCss('--chart-bar-hi');
  const barWidth = Math.max(2, ((A.plotW) / Math.max(ks.length, 1)) * 0.7);

  for (let i = 0; i < ks.length; i++) {
    const k = ks[i], p = ps[i];
    if (!isFinite(p)) continue;
    const px = xToPx(k);
    const py = yToPx(p);
    const py0 = yToPx(0);
    ctx.fillStyle = (opts.highlight !== undefined && k === opts.highlight) ? barHi : barColor;
    ctx.fillRect(px - barWidth/2, py, barWidth, py0 - py);
  }
}

/* Линия y=f(x) на [xMin, xMax] */
function drawCurve(canvas, fn, opts) {
  opts = opts || {};
  const N = 400;
  const xMin = opts.xMin, xMax = opts.xMax;
  const xs = [], ys = [];
  let yMaxAuto = 0;
  for (let i = 0; i <= N; i++) {
    const x = xMin + (xMax - xMin) * i / N;
    const y = fn(x);
    xs.push(x); ys.push(y);
    if (isFinite(y) && y > yMaxAuto) yMaxAuto = y;
  }
  let yMin = opts.yMin !== undefined ? opts.yMin : 0;
  let yMax = opts.yMax !== undefined ? opts.yMax : yMaxAuto * 1.1;
  if (yMax === 0) yMax = 1;

  const A = drawAxes(canvas, {
    xMin, xMax, yMin, yMax,
    xLabel: opts.xLabel || 'x',
    yLabel: opts.yLabel || 'f(x)'
  });
  const { ctx, xToPx, yToPx } = A;
  const lineCol = getCss('--chart-line');
  const fillCol = getCss('--chart-fill');

  // заполнение под кривой
  if (opts.fill !== false) {
    ctx.fillStyle = fillCol;
    ctx.beginPath();
    ctx.moveTo(xToPx(xs[0]), yToPx(0));
    for (let i = 0; i < xs.length; i++) {
      ctx.lineTo(xToPx(xs[i]), yToPx(Math.max(yMin, Math.min(yMax, ys[i] || 0))));
    }
    ctx.lineTo(xToPx(xs[xs.length-1]), yToPx(0));
    ctx.closePath();
    ctx.fill();
  }

  // линия
  ctx.strokeStyle = lineCol;
  ctx.lineWidth = 2;
  ctx.beginPath();
  let started = false;
  for (let i = 0; i < xs.length; i++) {
    const y = ys[i];
    if (!isFinite(y)) { started = false; continue; }
    const px = xToPx(xs[i]), py = yToPx(Math.max(yMin, Math.min(yMax, y)));
    if (!started) { ctx.moveTo(px, py); started = true; } else { ctx.lineTo(px, py); }
  }
  ctx.stroke();

  // закраска критической области
  if (opts.shadeFrom !== undefined) {
    const from = opts.shadeFrom;
    const shadeCol = getCss('--chart-marker') + '33'; // 33 alpha hex (~20%)
    ctx.fillStyle = shadeCol;
    ctx.beginPath();
    ctx.moveTo(xToPx(Math.max(from, xMin)), yToPx(0));
    for (let i = 0; i < xs.length; i++) {
      if (xs[i] < from) continue;
      ctx.lineTo(xToPx(xs[i]), yToPx(Math.max(yMin, Math.min(yMax, ys[i] || 0))));
    }
    ctx.lineTo(xToPx(xMax), yToPx(0));
    ctx.closePath();
    ctx.fill();
  }
  if (opts.shadeAbsFrom !== undefined) {
    const from = opts.shadeAbsFrom;
    const shadeCol = getCss('--chart-marker') + '33';
    ctx.fillStyle = shadeCol;
    // правый хвост
    ctx.beginPath();
    ctx.moveTo(xToPx(Math.max(from, xMin)), yToPx(0));
    for (let i = 0; i < xs.length; i++) {
      if (xs[i] < from) continue;
      ctx.lineTo(xToPx(xs[i]), yToPx(Math.max(yMin, Math.min(yMax, ys[i] || 0))));
    }
    ctx.lineTo(xToPx(xMax), yToPx(0));
    ctx.closePath();
    ctx.fill();
    // левый хвост
    ctx.beginPath();
    ctx.moveTo(xToPx(xMin), yToPx(0));
    for (let i = 0; i < xs.length; i++) {
      if (xs[i] > -from) break;
      ctx.lineTo(xToPx(xs[i]), yToPx(Math.max(yMin, Math.min(yMax, ys[i] || 0))));
    }
    ctx.lineTo(xToPx(Math.min(-from, xMax)), yToPx(0));
    ctx.closePath();
    ctx.fill();
  }

  // вертикальный маркер
  if (opts.marker !== undefined && isFinite(opts.marker)) {
    const xv = opts.marker;
    if (xv >= xMin && xv <= xMax) {
      const px = xToPx(xv);
      const yv = isFinite(opts.markerY) ? opts.markerY : fn(xv);
      const py = yToPx(Math.max(yMin, Math.min(yMax, yv || 0)));
      ctx.strokeStyle = getCss('--chart-marker');
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(px, yToPx(0));
      ctx.lineTo(px, py);
      ctx.stroke();
      ctx.setLineDash([]);
      // точка
      ctx.fillStyle = getCss('--chart-marker');
      ctx.beginPath();
      ctx.arc(px, py, 3.5, 0, 2*Math.PI);
      ctx.fill();
    }
  }
}

/* === Парсер свободного формата ввода === */
function parseData(text) {
  if (!text) return [];
  // Извлекаем все числовые подстроки, поддерживая запятую как десятичный
  const re = /-?\d+(?:[.,]\d+)?(?:[eE][+\-]?\d+)?/g;
  const matches = text.match(re) || [];
  return matches.map(s => parseFloat(s.replace(',', '.'))).filter(x => isFinite(x));
}

/* === Ступенчатая линия для эмпирической функции распределения === */
function drawSteps(canvas, sortedXs, opts) {
  opts = opts || {};
  const n = sortedXs.length;
  if (n === 0) {
    drawAxes(canvas, { xMin: 0, xMax: 1, yMin: 0, yMax: 1, xLabel: 'x', yLabel: 'F*(x)' });
    return;
  }
  // точки: уникальные значения и кумулятивные доли (правый предел)
  const points = [];
  let i = 0;
  while (i < n) {
    let j = i;
    while (j < n && sortedXs[j] === sortedXs[i]) j++;
    points.push({ x: sortedXs[i], y: j / n });
    i = j;
  }
  const range = sortedXs[n-1] - sortedXs[0] || 1;
  const xMin = sortedXs[0] - range * 0.1;
  const xMax = sortedXs[n-1] + range * 0.1;

  const A = drawAxes(canvas, {
    xMin, xMax, yMin: 0, yMax: 1.05,
    xLabel: opts.xLabel || 'x', yLabel: opts.yLabel || 'F*(x)'
  });
  const ctx = A.ctx;

  // ступеньки
  ctx.strokeStyle = getCss('--chart-line');
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(A.xToPx(xMin), A.yToPx(0));
  ctx.lineTo(A.xToPx(points[0].x), A.yToPx(0));
  let prevY = 0;
  for (const p of points) {
    ctx.lineTo(A.xToPx(p.x), A.yToPx(p.y)); // вертикальный скачок
    prevY = p.y;
  }
  ctx.lineTo(A.xToPx(xMax), A.yToPx(prevY));
  ctx.stroke();

  // точки скачков
  ctx.fillStyle = getCss('--chart-line');
  for (const p of points) {
    ctx.beginPath();
    ctx.arc(A.xToPx(p.x), A.yToPx(p.y), 3, 0, 2*Math.PI);
    ctx.fill();
  }
}

/* === Ступенчатая ЭФР для взвешенных данных (xᵢ с частотами nᵢ) === */
function drawStepsWeighted(canvas, sortedXs, ns, opts) {
  opts = opts || {};
  const N = ns.reduce((a,b)=>a+b, 0);
  if (!sortedXs.length || N === 0) {
    drawAxes(canvas, { xMin: 0, xMax: 1, yMin: 0, yMax: 1.05, xLabel: 'x', yLabel: 'F*(x)' });
    return;
  }
  const points = []; let cum = 0;
  for (let i = 0; i < sortedXs.length; i++) {
    cum += ns[i];
    points.push({ x: sortedXs[i], y: cum / N });
  }
  const range = (sortedXs[sortedXs.length-1] - sortedXs[0]) || 1;
  const xMin = sortedXs[0] - range * 0.1;
  const xMax = sortedXs[sortedXs.length-1] + range * 0.1;
  const A = drawAxes(canvas, {
    xMin, xMax, yMin: 0, yMax: 1.05,
    xLabel: opts.xLabel || 'x', yLabel: opts.yLabel || 'F*(x)'
  });
  const ctx = A.ctx;
  ctx.strokeStyle = getCss('--chart-line'); ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(A.xToPx(xMin), A.yToPx(0));
  ctx.lineTo(A.xToPx(points[0].x), A.yToPx(0));
  let prev = 0;
  for (const p of points) {
    ctx.lineTo(A.xToPx(p.x), A.yToPx(p.y));
    prev = p.y;
  }
  ctx.lineTo(A.xToPx(xMax), A.yToPx(prev));
  ctx.stroke();
  ctx.fillStyle = getCss('--chart-line');
  for (const p of points) {
    ctx.beginPath(); ctx.arc(A.xToPx(p.x), A.yToPx(p.y), 3, 0, 2*Math.PI); ctx.fill();
  }
}

/* === Кумулята (ломаная ЭФР) для интервального ряда === */
function drawEdfInterval(canvas, triples, opts) {
  opts = opts || {};
  if (!triples.length) {
    drawAxes(canvas, { xMin: 0, xMax: 1, yMin: 0, yMax: 1.05, xLabel: 'x', yLabel: 'F*(x)' });
    return;
  }
  const N = triples.reduce((a,t)=>a+t.n, 0);
  const xLo = triples[0].a, xHi = triples[triples.length-1].b;
  const pad = (xHi - xLo) * 0.05 || 1;
  const xMin = xLo - pad, xMax = xHi + pad;
  const A = drawAxes(canvas, {
    xMin, xMax, yMin: 0, yMax: 1.05,
    xLabel: opts.xLabel || 'x', yLabel: opts.yLabel || 'F*(x)'
  });
  const ctx = A.ctx;
  ctx.strokeStyle = getCss('--chart-line'); ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(A.xToPx(xMin), A.yToPx(0));
  ctx.lineTo(A.xToPx(triples[0].a), A.yToPx(0));
  let cum = 0;
  for (const t of triples) {
    cum += t.n;
    ctx.lineTo(A.xToPx(t.b), A.yToPx(cum / N));
  }
  ctx.lineTo(A.xToPx(xMax), A.yToPx(cum / N));
  ctx.stroke();
  ctx.fillStyle = getCss('--chart-line');
  ctx.beginPath(); ctx.arc(A.xToPx(triples[0].a), A.yToPx(0), 3, 0, 2*Math.PI); ctx.fill();
  let c2 = 0;
  for (const t of triples) {
    c2 += t.n;
    ctx.beginPath(); ctx.arc(A.xToPx(t.b), A.yToPx(c2/N), 3, 0, 2*Math.PI); ctx.fill();
  }
}

/* === Гистограмма по непрерывным интервалам === */
function drawHist(canvas, edges, freqs, opts) {
  opts = opts || {};
  const yMaxAuto = freqs.length ? Math.max(...freqs) * 1.15 : 1;
  const xMin = edges[0];
  const xMax = edges[edges.length - 1];
  const A = drawAxes(canvas, {
    xMin: xMin - (xMax - xMin)*0.03,
    xMax: xMax + (xMax - xMin)*0.03,
    yMin: 0, yMax: yMaxAuto,
    xLabel: opts.xLabel || 'x',
    yLabel: opts.yLabel || 'Частота'
  });
  const ctx = A.ctx;
  ctx.fillStyle = getCss('--chart-bar');
  ctx.strokeStyle = getCss('--card');
  ctx.lineWidth = 1;
  for (let k = 0; k < freqs.length; k++) {
    const x0 = A.xToPx(edges[k]), x1 = A.xToPx(edges[k+1]);
    const y0 = A.yToPx(0), y1 = A.yToPx(freqs[k]);
    ctx.fillRect(x0, y1, x1 - x0, y0 - y1);
    ctx.strokeRect(x0, y1, x1 - x0, y0 - y1);
  }
}

/* === Полигон: ломаная по дискретным точкам (x, частота) === */
function drawPolygon(canvas, xs, ys, opts) {
  opts = opts || {};
  if (xs.length === 0) {
    drawAxes(canvas, { xMin: 0, xMax: 1, yMin: 0, yMax: 1, xLabel: 'x', yLabel: 'Частота' });
    return;
  }
  const xMin = Math.min(...xs);
  const xMax = Math.max(...xs);
  const range = (xMax - xMin) || 1;
  const yMaxAuto = Math.max(...ys) * 1.15;
  const A = drawAxes(canvas, {
    xMin: xMin - range*0.1, xMax: xMax + range*0.1,
    yMin: 0, yMax: yMaxAuto,
    xLabel: opts.xLabel || 'x',
    yLabel: opts.yLabel || 'Частота'
  });
  const ctx = A.ctx;
  // линия
  ctx.strokeStyle = getCss('--chart-line');
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < xs.length; i++) {
    const px = A.xToPx(xs[i]), py = A.yToPx(ys[i]);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  // точки
  ctx.fillStyle = getCss('--chart-line');
  for (let i = 0; i < xs.length; i++) {
    ctx.beginPath();
    ctx.arc(A.xToPx(xs[i]), A.yToPx(ys[i]), 3.5, 0, 2*Math.PI);
    ctx.fill();
  }
}

/* === Сравнительная диаграмма: наблюдаемые бары + теоретические точки/линия === */
function drawCompareBars(canvas, xs, observed, expected, opts) {
  opts = opts || {};
  if (!xs.length) {
    drawAxes(canvas, { xMin: 0, xMax: 1, yMin: 0, yMax: 1, xLabel: 'x', yLabel: 'Частота' });
    return;
  }
  const yMaxAuto = Math.max(
    Math.max(...observed.filter(isFinite)),
    Math.max(...expected.filter(isFinite))
  ) * 1.15 || 1;
  const xMin = Math.min(...xs) - 0.6;
  const xMax = Math.max(...xs) + 0.6;
  const xTickValues = xs.length <= 20 ? xs.slice() : niceTicks(Math.min(...xs), Math.max(...xs), 10);
  const A = drawAxes(canvas, {
    xMin, xMax, yMin: 0, yMax: yMaxAuto,
    xLabel: opts.xLabel || 'x', yLabel: opts.yLabel || 'Частота',
    xTickValues
  });
  const ctx = A.ctx;
  const w = Math.max(2, (A.plotW / Math.max(xs.length, 1)) * 0.6);
  // наблюдаемые бары
  ctx.fillStyle = getCss('--chart-bar');
  for (let i = 0; i < xs.length; i++) {
    if (!isFinite(observed[i])) continue;
    const px = A.xToPx(xs[i]);
    const py = A.yToPx(observed[i]);
    const py0 = A.yToPx(0);
    ctx.fillRect(px - w/2, py, w, py0 - py);
  }
  // теоретические точки + ломаная
  ctx.strokeStyle = getCss('--chart-marker');
  ctx.fillStyle = getCss('--chart-marker');
  ctx.lineWidth = 2;
  ctx.beginPath();
  let started = false;
  for (let i = 0; i < xs.length; i++) {
    if (!isFinite(expected[i])) continue;
    const px = A.xToPx(xs[i]);
    const py = A.yToPx(expected[i]);
    if (!started) { ctx.moveTo(px, py); started = true; } else { ctx.lineTo(px, py); }
  }
  ctx.stroke();
  for (let i = 0; i < xs.length; i++) {
    if (!isFinite(expected[i])) continue;
    ctx.beginPath();
    ctx.arc(A.xToPx(xs[i]), A.yToPx(expected[i]), 3.5, 0, 2*Math.PI);
    ctx.fill();
  }
}

/* === Гистограмма + теоретическая плотность поверх (для непрерывных дистр.) === */
function drawHistWithCurve(canvas, edges, freqs, fn, N, opts) {
  opts = opts || {};
  const xLo = edges[0], xHi = edges[edges.length-1];
  const xMin = xLo - (xHi - xLo) * 0.05;
  const xMax = xHi + (xHi - xLo) * 0.05;

  // Сначала просчитываем теоретическую кривую и находим её максимум,
  // чтобы Y-ось вместила и наблюдаемые частоты, и пик плотности.
  const hAvg = (xHi - xLo) / freqs.length;
  const STEPS = 240;
  const xs = [], ys = [];
  let yTheoMax = 0;
  for (let i = 0; i <= STEPS; i++) {
    const x = xMin + (xMax - xMin) * i / STEPS;
    const y = fn(x) * N * hAvg;
    xs.push(x); ys.push(y);
    if (isFinite(y) && y > yTheoMax) yTheoMax = y;
  }
  const yObsMax = Math.max(...freqs.filter(isFinite)) || 0;
  const yMaxAuto = Math.max(yObsMax, yTheoMax) * 1.12 || 1;

  const A = drawAxes(canvas, {
    xMin, xMax, yMin: 0, yMax: yMaxAuto,
    xLabel: opts.xLabel || 'x', yLabel: opts.yLabel || 'Частота'
  });
  const ctx = A.ctx;

  // Бары
  ctx.fillStyle = getCss('--chart-bar');
  ctx.strokeStyle = getCss('--card');
  for (let k = 0; k < freqs.length; k++) {
    const x0 = A.xToPx(edges[k]), x1 = A.xToPx(edges[k+1]);
    const y0 = A.yToPx(0), y1 = A.yToPx(freqs[k]);
    ctx.fillRect(x0, y1, x1 - x0, y0 - y1);
    ctx.strokeRect(x0, y1, x1 - x0, y0 - y1);
  }

  // Теоретическая кривая
  ctx.strokeStyle = getCss('--chart-marker');
  ctx.lineWidth = 2;
  ctx.beginPath();
  let started = false;
  for (let i = 0; i < xs.length; i++) {
    const y = ys[i];
    if (!isFinite(y)) { started = false; continue; }
    const px = A.xToPx(xs[i]);
    const py = A.yToPx(y);
    if (!started) { ctx.moveTo(px, py); started = true; } else { ctx.lineTo(px, py); }
  }
  ctx.stroke();
}

/* === Группировка значений по уникальным элементам с частотами === */
function frequencies(xs) {
  const map = new Map();
  for (const x of xs) map.set(x, (map.get(x) || 0) + 1);
  const arr = [];
  for (const [k, v] of map) arr.push({ x: k, f: v });
  arr.sort((a, b) => a.x - b.x);
  return arr;
}

/* === buildBins: формирует расчётную таблицу для критерия Пирсона ===
   method: 'density' — учебная конвенция, n′ = h·N·f((a+b)/2);
           'cdf'     — точный интеграл, n′ = N·(F(b)−F(a)) с расширением хвостов до ±∞ */
function buildBins(mode, data, dist, params, nBinsManual, method) {
  method = method || 'density';
  const N = mode === 'raw'      ? data.xs.length
          : mode === 'discrete' ? data.pairs.reduce((a,p)=>a+p.n, 0)
          :                       data.tris.reduce((a,t)=>a+t.n, 0);
  if (N === 0) return { error: 'Нет данных.' };

  if (dist.isDiscrete) {
    if (mode === 'interval') return { error: 'Дискретное распределение несовместимо с интервальным рядом — переключите режим ввода.' };
    let pairs;
    if (mode === 'raw') {
      pairs = frequencies(data.xs).map(p => ({ x: p.x, n: p.f }));
    } else {
      pairs = data.pairs.slice().sort((a,b) => a.x - b.x);
    }
    const rows = [];
    let pSum = 0;
    for (const p of pairs) {
      const pi = dist.pmf(p.x, params);
      pSum += pi;
      rows.push({ label: 'X = ' + fmt(p.x, 4), n: p.n, pi, np: N * pi, x: p.x });
    }
    const tail = 1 - pSum;
    if (tail > 1e-9) rows.push({ label: 'другие значения', n: 0, pi: tail, np: N * tail, x: NaN });
    return { rows, N };
  }

  // непрерывное
  if (mode === 'discrete') return { error: 'Непрерывное распределение несовместимо с дискретным рядом — переключите режим ввода.' };
  let edges, ns;
  if (mode === 'raw') {
    const xs = data.xs;
    let nBins = nBinsManual;
    if (!Number.isInteger(nBins) || nBins < 1)
      nBins = Math.max(2, Math.round(1 + Math.log2(xs.length)));
    const lo = Math.min(...xs), hi = Math.max(...xs);
    const range = (hi - lo) || 1;
    const h = range / nBins;
    edges = []; for (let i = 0; i <= nBins; i++) edges.push(lo + i * h);
    ns = new Array(nBins).fill(0);
    for (const x of xs) {
      let kk = Math.floor((x - lo) / h);
      if (kk >= nBins) kk = nBins - 1;
      if (kk < 0) kk = 0;
      ns[kk]++;
    }
  } else {
    edges = [data.tris[0].a]; for (const t of data.tris) edges.push(t.b);
    ns = data.tris.map(t => t.n);
  }
  const m = ns.length;
  const rows = [];
  for (let i = 0; i < m; i++) {
    const a = edges[i], b = edges[i + 1];
    const labelLo = fmt(a, 4), labelHi = fmt(b, 4);
    let pi;
    if (method === 'density') {
      // учебный метод: n′ = h·N·f((a+b)/2). pᵢ = h·f(середины).
      const h = b - a;
      const mid = (a + b) / 2;
      pi = h * dist.pdf(mid, params);
      rows.push({
        label: '[' + labelLo + '; ' + labelHi + ')',
        n: ns[i], pi, np: N * pi,
        a, b, x: mid
      });
    } else {
      // CDF метод: расширяем крайние интервалы до ±∞, чтобы Σpᵢ = 1
      const lo = i === 0       ? -Infinity : a;
      const hi = i === m - 1   ? +Infinity : b;
      const Flo = isFinite(lo) ? dist.cdf(lo, params) : 0;
      const Fhi = isFinite(hi) ? dist.cdf(hi, params) : 1;
      pi = Math.max(0, Fhi - Flo);
      const lLo = i === 0     ? '−∞' : labelLo;
      const lHi = i === m - 1 ? '+∞' : labelHi;
      rows.push({
        label: '[' + lLo + '; ' + lHi + ')',
        n: ns[i], pi, np: N * pi,
        a, b, x: (a + b) / 2
      });
    }
  }
  return { rows, N, edges, ns };
}

/* === mergeBins: объединяет соседние строки, пока Npᵢ < threshold === */
function mergeBins(rows, threshold) {
  threshold = threshold || 5;
  const out = [];
  for (const r of rows) {
    if (out.length === 0) { out.push(Object.assign({}, r)); continue; }
    const last = out[out.length - 1];
    if (last.np < threshold) {
      last.label = last.label + ' ∪ ' + r.label;
      last.n  += r.n;
      last.np += r.np;
      last.pi  = (last.pi || 0) + (r.pi || 0);
    } else {
      out.push(Object.assign({}, r));
    }
  }
  if (out.length >= 2 && out[out.length - 1].np < threshold) {
    const last = out.pop();
    const prev = out[out.length - 1];
    prev.label = prev.label + ' ∪ ' + last.label;
    prev.n  += last.n;
    prev.np += last.np;
    prev.pi  = (prev.pi || 0) + (last.pi || 0);
  }
  return out;
}

      const compute = () => {
        const N = num('f8-N'), K = num('f8-K'), n = num('f8-n');
        if (!Number.isInteger(N) || !Number.isInteger(K) || !Number.isInteger(n)
            || N <= 0 || K < 0 || n < 0 || K > N || n > N) {

          setVal('f8-var','—');
          $('f8-table').innerHTML = '';
          return;

        const kMin = Math.max(0, n + K - N);
        const kMax = Math.min(n, K);
        const ks = [], ps = [];
        for (let k = 0; k <= n; k++) {
          ks.push(k);
          ps.push((k >= kMin && k <= kMax) ? M.hypgeomPmf(k, N, K, n) : 0);

        ['median', 'Медиана Me',             'Серединное значение. Для интервального ряда — по формуле x₀ + h(N⁄2 − S₋₁)⁄n_Me. Робастна к выбросам.', 'Me = a₀ + h(N⁄2 − S₋₁)⁄n_Me'],
        ['mode',   'Мода Mo',                'Наиболее часто встречающееся значение (или интервал). Для интервального — формула с соседними частотами.', 'Mo = a₀ + h(n_Mo − n₋₁) ⁄ ((n_Mo − n₋₁) + (n_Mo − n₊₁))'],
        ['varB',   'Дисперсия выб. D_в',     'Средний квадрат отклонения от среднего; для группированных данных — взвешенный.', 'D_в = Σ (xᵢ − x̄)² nᵢ ⁄ N'],

        ['sd',     'СКО s',                  'Корень из исправленной дисперсии — несмещённая оценка стандартного отклонения.', 's = √s²'],
        ['q1',     'Нижний квартиль Q₁',     'Значение, ниже которого 25% наблюдений (с учётом частот).', ''],
        ['q3',     'Верхний квартиль Q₃',    'Значение, ниже которого 75% наблюдений.', ''],
        ['iqr',    'IQR',                    'Межквартильный размах — робастная мера разброса.', 'IQR = Q₃ − Q₁'],
        ['cv',     'Коэф. вариации V',       'Относительная мера разброса (в %). V > 33% — признак неоднородности.', 'V = σ ⁄ |x̄|'],
        ['skew',   'Асимметрия As',          'Безразмерная мера несимметричности. As > 0 — правый хвост длиннее.', 'As = μ₃ ⁄ σ³'],
        ['kurt',   'Эксцесс Es',             'Мера остроты пика. Es > 0 — острая вершина с тяжёлыми хвостами; Es = 0 — как у нормального.', 'Es = μ₄ ⁄ σ⁴ − 3']
      ];
      $('f13-stats').innerHTML = FIELDS.map(([k, lbl, help, f]) =>
        `<div class="tv-result">
           <div class="tv-rlabel">${lbl} ${makeHelp(help, f)}</div>
           <div class="tv-rval" id="f13-${k}">—</div>
         </div>`).join('');

      // === Состояние ===
      let mode = 'raw';
      let raw = new Array(10).fill(NaN);
      let discPairs  = Array.from({length: 5}, () => ({ x: NaN, n: NaN }));
      let intTriples = Array.from({length: 5}, () => ({ a: NaN, b: NaN, n: NaN }));

      // === RAW: сетка ячеек ===
      function renderRawCells() {
        const c = $('f13r-cells'); c.innerHTML = '';
        for (let i = 0; i < raw.length; i++) {
          const div = document.createElement('div'); div.className = 'tv-cell';

          inp.addEventListener('input', () => {
            const v = parseFloat(inp.value.replace(',', '.'));
            raw[i] = isFinite(v) ? v : NaN; recompute();
          });
          const x = document.createElement('button');
          x.className = 'tv-cell-x'; x.textContent = '×'; x.title = 'Удалить';
          x.addEventListener('click', () => { raw.splice(i, 1); renderRawCells(); recompute(); });
          div.appendChild(inp); div.appendChild(x);
          c.appendChild(div);
        }
        const add = document.createElement('button');
        add.className = 'tv-cell-add'; add.textContent = '+'; add.title = 'Добавить ячейку';
        add.addEventListener('click', () => { raw.push(NaN); renderRawCells(); });
        c.appendChild(add);
      }

      // === DISCRETE: пары (x, n) ===
      function renderDiscRows() {
        const c = $('f13d-rows'); c.innerHTML = '';
        for (let i = 0; i < discPairs.length; i++) {
          const row = document.createElement('div'); row.className = 'tv-data-row';
          const num = document.createElement('div'); num.className = 'tv-row-num'; num.textContent = (i + 1);
          const ix = document.createElement('input'); ix.type = 'text';
          ix.value = isFinite(discPairs[i].x) ? String(discPairs[i].x).replace('.', ',') : '';
          ix.addEventListener('input', () => {
            const v = parseFloat(ix.value.replace(',', '.'));
            discPairs[i].x = isFinite(v) ? v : NaN; recompute();
          });
          const inn = document.createElement('input'); inn.type = 'text';
          inn.value = isFinite(discPairs[i].n) ? String(discPairs[i].n).replace('.', ',') : '';
          inn.addEventListener('input', () => {
            const v = parseFloat(inn.value.replace(',', '.'));
            discPairs[i].n = isFinite(v) ? v : NaN; recompute();
          });
          const x = document.createElement('button');
          x.className = 'tv-cell-x'; x.textContent = '×';
          x.addEventListener('click', () => { discPairs.splice(i, 1); renderDiscRows(); recompute(); });
          row.appendChild(num); row.appendChild(ix); row.appendChild(inn); row.appendChild(x);
          c.appendChild(row);
        }
      }

      // === INTERVAL: тройки (a, b, n) ===
      function renderIntRows() {
        const c = $('f13i-rows'); c.innerHTML = '';
        for (let i = 0; i < intTriples.length; i++) {
          const row = document.createElement('div'); row.className = 'tv-data-row tv-tri';
          const num = document.createElement('div'); num.className = 'tv-row-num'; num.textContent = (i + 1);
          const ia = document.createElement('input'); ia.type = 'text';
          ia.value = isFinite(intTriples[i].a) ? String(intTriples[i].a).replace('.', ',') : '';
          ia.addEventListener('input', () => {
            const v = parseFloat(ia.value.replace(',', '.'));
            intTriples[i].a = isFinite(v) ? v : NaN; recompute();
          });
          const ib = document.createElement('input'); ib.type = 'text';
          ib.value = isFinite(intTriples[i].b) ? String(intTriples[i].b).replace('.', ',') : '';
          ib.addEventListener('input', () => {
            const v = parseFloat(ib.value.replace(',', '.'));
            intTriples[i].b = isFinite(v) ? v : NaN; recompute();
          });
          const inn = document.createElement('input'); inn.type = 'text';
          inn.value = isFinite(intTriples[i].n) ? String(intTriples[i].n).replace('.', ',') : '';
          inn.addEventListener('input', () => {
            const v = parseFloat(inn.value.replace(',', '.'));
            intTriples[i].n = isFinite(v) ? v : NaN; recompute();
          });
          const x = document.createElement('button');
          x.className = 'tv-cell-x'; x.textContent = '×';
          x.addEventListener('click', () => { intTriples.splice(i, 1); renderIntRows(); recompute(); });
          row.appendChild(num); row.appendChild(ia); row.appendChild(ib); row.appendChild(inn); row.appendChild(x);
          c.appendChild(row);
        }
      }

      function setMode(m) {
        mode = m;
        $('f13-mode-raw').style.display      = mode === 'raw'      ? '' : 'none';
        $('f13-mode-discrete').style.display = mode === 'discrete' ? '' : 'none';
        $('f13-mode-interval').style.display = mode === 'interval' ? '' : 'none';
        $('f13-mode-tabs').querySelectorAll('button').forEach(b =>
          b.classList.toggle('active', b.dataset.mode === mode));
        $('f13-bins-wrap').style.display = mode === 'raw' ? '' : 'none';
        if (mode === 'raw') {
          $('f13-poly-title').textContent = 'Линия частот уникальных значений';
          $('f13-hist-title').textContent = 'Гистограмма по равным интервалам';
          $('f13-edf-title').textContent  = 'Ступенчатая F*(x) сырой выборки';
        } else if (mode === 'discrete') {
          $('f13-poly-title').textContent = 'Полигон частот по точкам (xᵢ, nᵢ)';
          $('f13-hist-title').textContent = 'Столбчатая диаграмма частот';
          $('f13-edf-title').textContent  = 'Ступенчатая F*(x) дискретного ряда';
        } else {
          $('f13-poly-title').textContent = 'Полигон по серединам интервалов';
          $('f13-hist-title').textContent = 'Гистограмма по введённым интервалам';
          $('f13-edf-title').textContent  = 'Кумулята F*(x) интервального ряда';
        }
        recompute();
      }

      function getActiveData() {
        if (mode === 'raw') return { kind: 'raw', xs: raw.filter(v => isFinite(v)) };
        if (mode === 'discrete') {
          const pairs = discPairs
            .filter(p => isFinite(p.x) && isFinite(p.n) && p.n > 0)
            .map(p => ({ x: p.x, n: p.n }))
            .sort((a, b) => a.x - b.x);
          // объединяем дубли
          const merged = [];
          for (const p of pairs) {
            if (merged.length && merged[merged.length-1].x === p.x) merged[merged.length-1].n += p.n;
            else merged.push({ x: p.x, n: p.n });
          }
          return { kind: 'discrete', pairs: merged };
        }
        const tris = intTriples
          .filter(t => isFinite(t.a) && isFinite(t.b) && isFinite(t.n) && t.n > 0 && t.b > t.a)
          .map(t => ({ a: t.a, b: t.b, n: t.n }))
          .sort((x, y) => x.a - y.a);
        let warn = '';
        for (let i = 1; i < tris.length; i++) {
          if (tris[i].a < tris[i-1].b - 1e-9) { warn = 'Интервалы пересекаются — характеристики могут быть некорректны.'; break; }
          if (tris[i].a > tris[i-1].b + 1e-9) { warn = 'Между интервалами есть пробел — расчёт идёт по введённым данным как есть.'; break; }
        }
        const w = $('f13i-warn');
        if (warn) { w.textContent = warn; w.style.display = ''; } else { w.style.display = 'none'; }
        return { kind: 'interval', tris };
      }

      function recompute() {
        const data = getActiveData();
        const set = (k, v) => setVal('f13-' + k, v);

        if (mode === 'raw')           $('f13r-n').textContent = data.xs.length;
        else if (mode === 'discrete') $('f13d-N').textContent = data.pairs.reduce((a,p)=>a + p.n, 0);
        else                          $('f13i-N').textContent = data.tris.reduce((a,t)=>a + t.n, 0);

        const empty =
          (data.kind === 'raw'      && data.xs.length === 0) ||
          (data.kind === 'discrete' && data.pairs.length === 0) ||
          (data.kind === 'interval' && data.tris.length === 0);
        if (empty) {
          ['min','max','range','mean','median','mode','varB','var','sdB','sd','q1','q3','iqr','cv','skew','kurt']
            .forEach(k => set(k, '—'));
          drawSteps($('f13-edf'), []);
          drawHist($('f13-hist'), [0, 1], [0]);
          drawPolygon($('f13-poly'), [], []);
          return;
        }

        let minVal, maxVal, m, vB, vS, q1, q3, modeArr, medianVal;
        if (data.kind === 'raw') {
          const xs = data.xs;
          minVal = Math.min(...xs); maxVal = Math.max(...xs);
          m = M.mean(xs); vB = M.variance(xs, true); vS = M.variance(xs, false);
          q1 = M.quantile(xs, 0.25); q3 = M.quantile(xs, 0.75); medianVal = M.median(xs);
          modeArr = M.mode(xs);
          set('skew', xs.length >= 2 ? fmt(M.skewness(xs), 4) : '—');
          set('kurt', xs.length >= 2 ? fmt(M.kurtosis(xs), 4) : '—');
        } else if (data.kind === 'discrete') {
          const xs = data.pairs.map(p => p.x);
          const ns = data.pairs.map(p => p.n);
          const N = M.wSum(ns);
          minVal = xs[0]; maxVal = xs[xs.length - 1];
          m = M.wMean(xs, ns); vB = M.wVariance(xs, ns, true); vS = M.wVariance(xs, ns, false);
          q1 = M.discreteQuantile(xs, ns, 0.25);
          q3 = M.discreteQuantile(xs, ns, 0.75);
          medianVal = M.discreteQuantile(xs, ns, 0.5);
          modeArr = M.discreteMode(xs, ns);
          set('skew', N >= 2 ? fmt(M.wSkewness(xs, ns), 4) : '—');
          set('kurt', N >= 2 ? fmt(M.wKurtosis(xs, ns), 4) : '—');
        } else {
          const tris = data.tris;
          minVal = tris[0].a; maxVal = tris[tris.length - 1].b;
          m = M.intervalMean(tris);
          vB = M.intervalVariance(tris, true); vS = M.intervalVariance(tris, false);
          q1 = M.intervalQuantile(tris, 0.25);
          q3 = M.intervalQuantile(tris, 0.75);
          medianVal = M.intervalMedian(tris);
          const mo = M.intervalMode(tris);
          modeArr = isFinite(mo) ? [mo] : [];
          const N = tris.reduce((a, t) => a + t.n, 0);
          set('skew', N >= 2 ? fmt(M.intervalSkewness(tris), 4) : '—');
          set('kurt', N >= 2 ? fmt(M.intervalKurtosis(tris), 4) : '—');
        }

        set('min',    fmt(minVal, 6));
        set('max',    fmt(maxVal, 6));
        set('range',  fmt(maxVal - minVal, 6));
        set('mean',   fmt(m, 6));
        set('median', fmt(medianVal, 6));
        set('mode',   modeArr.length ? modeArr.map(v => fmt(v, 4)).join('; ') : 'нет');
        set('varB',   fmt(vB, 6));
        set('var',    isFinite(vS) ? fmt(vS, 6) : 'нужно N ≥ 2');
        set('sdB',    fmt(Math.sqrt(vB), 6));
        set('sd',     isFinite(vS) ? fmt(Math.sqrt(vS), 6) : '—');
        set('q1',     fmt(q1, 6));
        set('q3',     fmt(q3, 6));
        set('iqr',    fmt(q3 - q1, 6));
        const cv = m === 0 ? NaN : Math.sqrt(vB) / Math.abs(m);
        set('cv',     isFinite(cv) ? fmtPct(cv) : '—');

        // Графики
        if ($('t13a').classList.contains('active')) {
          if (data.kind === 'raw') {
            const fr = frequencies(data.xs);
            drawPolygon($('f13-poly'), fr.map(p => p.x), fr.map(p => p.f));
          } else if (data.kind === 'discrete') {
            drawPolygon($('f13-poly'), data.pairs.map(p => p.x), data.pairs.map(p => p.n));
          } else {
            const xs = data.tris.map(t => (t.a + t.b) / 2);
            const ns = data.tris.map(t => t.n);
            drawPolygon($('f13-poly'), xs, ns);
          }
        } else if ($('t13b').classList.contains('active')) {
          if (data.kind === 'raw') {
            const xs = data.xs;
            let nBins = parseInt($('f13-bins').value);
            if (!Number.isInteger(nBins) || nBins < 1)
              nBins = Math.max(1, Math.round(1 + Math.log2(xs.length)));
            const lo = Math.min(...xs), hi = Math.max(...xs);
            const range = (hi - lo) || 1;
            const h = range / nBins;
            const edges = []; for (let i = 0; i <= nBins; i++) edges.push(lo + i * h);
            const freqs = new Array(nBins).fill(0);
            for (const x of xs) {
              let kk = Math.floor((x - lo) / h);
              if (kk >= nBins) kk = nBins - 1;
              if (kk < 0) kk = 0;
              freqs[kk]++;
            }
            drawHist($('f13-hist'), edges, freqs);
          } else if (data.kind === 'discrete') {
            drawBars($('f13-hist'), data.pairs.map(p => p.x), data.pairs.map(p => p.n));
          } else {
            const edges = [data.tris[0].a];
            for (const t of data.tris) edges.push(t.b);
            drawHist($('f13-hist'), edges, data.tris.map(t => t.n));
          }
        } else if ($('t13c').classList.contains('active')) {
          if (data.kind === 'raw') {
            drawSteps($('f13-edf'), [...data.xs].sort((a, b) => a - b));
          } else if (data.kind === 'discrete') {
            drawStepsWeighted($('f13-edf'), data.pairs.map(p => p.x), data.pairs.map(p => p.n));
          } else {
            drawEdfInterval($('f13-edf'), data.tris);
          }
        }
      }

      // === Слушатели ===
      $('f13-mode-tabs').querySelectorAll('button').forEach(b =>
        b.addEventListener('click', () => setMode(b.dataset.mode)));

      const tabs = $('f13-tabs').querySelectorAll('button');
      tabs.forEach(b => b.addEventListener('click', () => {
        tabs.forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        ['t13a','t13b','t13c'].forEach(id => $(id).classList.remove('active'));
        $(b.dataset.sub).classList.add('active');
        recompute();
      }));

      // Raw
      $('f13r-apply').addEventListener('click', () => {
        const parsed = parseData($('f13r-text').value);
        raw = parsed.length ? parsed.slice() : new Array(10).fill(NaN);
        renderRawCells(); recompute();
      });
      $('f13r-example').addEventListener('click', () => {
        raw = [12, 14, 16, 12, 18, 14, 16, 14, 12, 16, 18, 20, 14, 16, 12];
        $('f13r-text').value = raw.join(', ');
        renderRawCells(); recompute();
      });
      $('f13r-clear').addEventListener('click', () => {
        raw = new Array(10).fill(NaN);
        $('f13r-text').value = ''; renderRawCells(); recompute();
      });
      $('f13r-add10').addEventListener('click', () => {
        for (let i = 0; i < 10; i++) raw.push(NaN); renderRawCells();
      });
      $('f13r-text').addEventListener('blur', () => {
        if ($('f13r-text').value.trim()) $('f13r-apply').click();
      });
      $('f13-bins').addEventListener('input', recompute);

      // Discrete
      $('f13d-apply').addEventListener('click', () => {
        const arr = parseData($('f13d-text').value);
        const pairs = [];
        for (let i = 0; i + 1 < arr.length; i += 2) pairs.push({ x: arr[i], n: arr[i + 1] });
        discPairs = pairs.length ? pairs : Array.from({length: 5}, () => ({ x: NaN, n: NaN }));
        renderDiscRows(); recompute();
      });
      $('f13d-example').addEventListener('click', () => {
        discPairs = [{x:10,n:5},{x:12,n:12},{x:14,n:18},{x:16,n:9},{x:18,n:6}];
        $('f13d-text').value = discPairs.map(p => p.x + ' ' + p.n).join(', ');
        renderDiscRows(); recompute();
      });
      $('f13d-clear').addEventListener('click', () => {
        discPairs = Array.from({length: 5}, () => ({ x: NaN, n: NaN }));
        $('f13d-text').value = ''; renderDiscRows(); recompute();
      });
      $('f13d-add').addEventListener('click', () => {
        discPairs.push({ x: NaN, n: NaN }); renderDiscRows();
      });
      $('f13d-text').addEventListener('blur', () => {
        if ($('f13d-text').value.trim()) $('f13d-apply').click();
      });

      // Interval
      $('f13i-apply').addEventListener('click', () => {
        const arr = parseData($('f13i-text').value);
        const tris = [];
        for (let i = 0; i + 2 < arr.length; i += 3)
          tris.push({ a: arr[i], b: arr[i + 1], n: arr[i + 2] });
        intTriples = tris.length ? tris : Array.from({length: 5}, () => ({ a: NaN, b: NaN, n: NaN }));
        renderIntRows(); recompute();
      });
      $('f13i-example').addEventListener('click', () => {
        intTriples = [{a:0,b:10,n:5},{a:10,b:20,n:12},{a:20,b:30,n:18},{a:30,b:40,n:10},{a:40,b:50,n:5}];
        $('f13i-text').value = intTriples.map(t => t.a + ' ' + t.b + ' ' + t.n).join(', ');
        renderIntRows(); recompute();
      });
      $('f13i-clear').addEventListener('click', () => {
        intTriples = Array.from({length: 5}, () => ({ a: NaN, b: NaN, n: NaN }));
        $('f13i-text').value = ''; renderIntRows(); recompute();
      });
      $('f13i-add').addEventListener('click', () => {
        intTriples.push({ a: NaN, b: NaN, n: NaN }); renderIntRows();
      });
      $('f13i-text').addEventListener('blur', () => {
        if ($('f13i-text').value.trim()) $('f13i-apply').click();
      });

      renderRawCells(); renderDiscRows(); renderIntRows();
      setMode('raw');
    }
  },

        const a = num('f18-a'), b = num('f18-b'), x = num('f18-x');
        if (!isFinite(a) || a <= 0 || !isFinite(b) || b <= 0 || !isFinite(x) || x < 0 || x > 1) {
          setVal('f18-pdf', 'Нужно α, β > 0; x ∈ [0,1]', true);
          return;
        }
        setVal('f18-pdf', fmt(M.betaPdf(x, a, b), 6));
        setVal('f18-cdf', fmt(M.betaCdf(x, a, b), 6));
        setVal('f18-mean', fmt(a/(a+b), 4));
        setVal('f18-var', fmt((a*b)/((a+b)*(a+b)*(a+b+1)), 6));
        // авто-масштаб по y
        const sample = []; for (let i = 1; i < 50; i++) sample.push(M.betaPdf(i/50, a, b));
        const yMaxAuto = Math.max(...sample.filter(isFinite));
        drawCurve($('f18-pdfc'), t => M.betaPdf(t, a, b), {
          xMin: 0, xMax: 1, yMin: 0, yMax: yMaxAuto*1.1 || 1,
          xLabel: 'x', yLabel: 'f(x)',
          marker: x, markerY: M.betaPdf(x, a, b)
        });
        drawCurve($('f18-cdfc'), t => M.betaCdf(t, a, b), {
          xMin: 0, xMax: 1, yMin: 0, yMax: 1.05, fill: false,
          xLabel: 'x', yLabel: 'F(x)',
          marker: x, markerY: M.betaCdf(x, a, b)
        });
      };
      ['f18-a','f18-b','f18-x'].forEach(i => $(i).addEventListener('input', compute));
      compute();
    }
  },

        <div class="tv-result"><div class="tv-rlabel">Степени свободы k ${makeHelp('m — итоговое число интервалов (после объединения тех, где Npᵢ < 5); r — число параметров, оценённых по выборке.', 'k = m − r − 1')}</div><div class="tv-rval" id="f19-df">—</div></div>
